# The URL the site will be built for
base_url = "https://myyrakle.github.io"

# Use the terminus theme
theme = "terminus"

title = "myyrakle's note"
description = "dev blog"
author = "myyrakle"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# When set to "true", a feed is automatically generated.
generate_feeds = true

taxonomies = [
    { name = "tags", feed = true, paginate_by = 20 },
]

[markdown]
render_emoji = true
bottom_footnotes = true
github_alerts = true

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
layout = "center"
show_default_author = false
close_responsive_menu_on_resize = true
favicon_emoji = "🦀"

main_menu = [
    { name = "blog", url = "blog", trailing_slash = true },
    { name = "tags", url = "tags", trailing_slash = true },
    { name = "naver", url = "https://blog.naver.com/sssang97", trailing_slash = true },
    { name = "github", url = "https://github.com/myyrakle", trailing_slash = true },
]

socials = [
    { name = "github", url = "https://github.com/myyrakle" },
]
